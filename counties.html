<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESF OpenFrontier - NY County Statistics</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; }

        #map { flex: 1; }

        #sidebar {
            width: 320px; min-width: 320px; height: 100vh; overflow-y: auto;
            background: #f8f9fa; border-left: 1px solid #dee2e6;
            display: flex; flex-direction: column;
        }

        .sidebar-header {
            padding: 16px; background: #2d6a4f; color: white;
        }
        .sidebar-header h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .sidebar-header p { font-size: 12px; opacity: 0.85; }

        .controls {
            padding: 14px; background: white; border-bottom: 1px solid #dee2e6;
            display: flex; flex-direction: column; gap: 10px;
        }
        .control-row { display: flex; flex-direction: column; gap: 4px; }
        .control-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #666; }

        .var-buttons { display: flex; gap: 4px; }
        .var-btn {
            flex: 1; padding: 6px 0; border: 2px solid #ccc; border-radius: 6px;
            background: white; cursor: pointer; font-size: 12px; font-weight: 700;
            transition: all 0.15s;
        }
        .var-btn.active { background: #2d6a4f; color: white; border-color: #2d6a4f; }
        .var-btn:hover:not(.active) { background: #e8f5ee; border-color: #2d6a4f; }

        .year-row { display: flex; align-items: center; gap: 8px; }
        #year-slider { flex: 1; accent-color: #2d6a4f; cursor: pointer; }
        #year-display { font-size: 18px; font-weight: 800; color: #2d6a4f; min-width: 44px; text-align: right; }

        .stats-area { flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 14px; }

        .prompt {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 200px; color: #aaa; text-align: center; gap: 12px;
        }
        .prompt svg { opacity: 0.3; }
        .prompt p { font-size: 13px; }

        .county-name { font-size: 20px; font-weight: 800; color: #1a1a1a; margin-bottom: 2px; }
        .county-sub { font-size: 12px; color: #888; margin-bottom: 12px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card {
            background: white; border-radius: 8px; padding: 10px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .stat-card.highlight {
            grid-column: 1 / -1;
            background: #2d6a4f; color: white;
        }
        .stat-value { font-size: 22px; font-weight: 800; line-height: 1.1; }
        .stat-card.highlight .stat-value { font-size: 28px; }
        .stat-unit { font-size: 11px; opacity: 0.75; }
        .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
        .stat-card.highlight .stat-label { color: rgba(255,255,255,0.75); }

        .histogram-section { }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin-bottom: 8px; }
        .histogram { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
        .hist-bar {
            flex: 1; background: #2d6a4f; border-radius: 2px 2px 0 0;
            transition: background 0.15s; min-height: 2px; cursor: default;
        }
        .hist-bar:hover { background: #1b4332; }
        .hist-axis { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-top: 3px; }

        .chart-section { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .chart-section canvas { display: block; }

        .loading {
            display: flex; align-items: center; gap: 8px;
            color: #666; font-size: 13px; padding: 8px 0;
        }
        .spinner {
            width: 16px; height: 16px; border: 2px solid #ddd;
            border-top-color: #2d6a4f; border-radius: 50%;
            animation: spin 0.8s linear infinite; flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Colorbar */
        .colorbar {
            position: absolute; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(255,255,255,0.95); padding: 10px 12px;
            border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex; align-items: stretch; gap: 8px;
        }
        .colorbar-gradient {
            width: 16px; height: 140px; border-radius: 3px; border: 1px solid #ccc;
            background: linear-gradient(to top,
                #440154 0%, #482878 12.5%, #3e4989 25%, #31688e 37.5%,
                #26828e 50%, #1f9e89 62.5%, #35b779 75%, #6ece58 87.5%,
                #fde725 100%);
        }
        .colorbar-labels {
            display: flex; flex-direction: column; justify-content: space-between;
            font-size: 11px; font-weight: 600; color: #444;
        }
        .colorbar-title {
            font-size: 11px; font-weight: 700; color: #333;
            writing-mode: vertical-rl; text-orientation: mixed;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div id="map">
        <div class="colorbar">
            <div class="colorbar-title" id="cb-title">AGB (Mg/ha)</div>
            <div class="colorbar-gradient"></div>
            <div class="colorbar-labels">
                <span id="cb-max">250</span>
                <span id="cb-mid">125</span>
                <span id="cb-min">0</span>
            </div>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>NY County Carbon Statistics</h2>
            <p>Click a county to compute area statistics</p>
        </div>

        <div class="controls">
            <div class="control-row">
                <span class="control-label">Variable</span>
                <div class="var-buttons">
                    <button class="var-btn active" data-var="agb" title="Aboveground Biomass">AGB</button>
                    <button class="var-btn" data-var="agc" title="Aboveground Carbon">AGC</button>
                    <button class="var-btn" data-var="bgc" title="Belowground Carbon">BGC</button>
                </div>
            </div>
            <div class="control-row">
                <span class="control-label">Year</span>
                <div class="year-row">
                    <input type="range" id="year-slider" min="1990" max="2023" value="2023" step="1">
                    <span id="year-display">2023</span>
                </div>
            </div>
        </div>

        <div class="stats-area" id="stats-area">
            <div class="prompt">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 6l9-3 9 3v12l-9 3-9-3V6z"/>
                    <path d="M12 3v18M3 6l9 3 9-3"/>
                </svg>
                <p>Click any county on the map to compute statistics for that area</p>
            </div>
        </div>
    </div>

    <script>
        const TITILER = 'https://rq1vo2j0e9.execute-api.us-east-1.amazonaws.com';
        const COUNTIES_URL = 'https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/new-york-counties.geojson';
        const YEARS = Array.from({length: 34}, (_, i) => 1990 + i);  // 1990..2023

        const VAR_INFO = {
            agb: { label: 'AGB', fullLabel: 'Aboveground Biomass', unit: 'Mg/ha', max: 250 },
            agc: { label: 'AGC', fullLabel: 'Aboveground Carbon', unit: 'Mg C/ha', max: 125 },
            bgc: { label: 'BGC', fullLabel: 'Belowground Carbon', unit: 'Mg C/ha', max: 75 },
        };

        let currentVar = 'agb';
        let currentYear = 2023;
        let selectedLayer = null;
        let selectedFeature = null;
        let countiesGeoJSON = null;
        let tileLayer = null;

        // Cache: { 'agb': { means, stds }, 'agc': {...}, ... } per selected county
        let tsCache = {};
        let tsChart = null;

        // Map
        const map = L.map('map').setView([42.9, -76.0], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19
        }).addTo(map);

        function cogUrl(variable, year) {
            return `s3://cafri/esf-${variable}/${variable}_${year}_cog.tif`;
        }
        function tileUrl(variable, year) {
            const rescale = `0,${VAR_INFO[variable].max}`;
            return `${TITILER}/cog/tiles/WebMercatorQuad/{z}/{x}/{y}.png`
                + `?url=${encodeURIComponent(cogUrl(variable, year))}&rescale=${rescale}&colormap_name=viridis`;
        }

        function updateTileLayer() {
            if (tileLayer) map.removeLayer(tileLayer);
            tileLayer = L.tileLayer(tileUrl(currentVar, currentYear), {
                opacity: 0.75, attribution: 'ESF / Frontier Geospatial'
            }).addTo(map);
            if (countiesGeoJSON) countiesGeoJSON.bringToFront();
        }

        function updateColorbar() {
            const v = VAR_INFO[currentVar];
            document.getElementById('cb-title').textContent = `${v.label} (${v.unit})`;
            document.getElementById('cb-max').textContent = v.max;
            document.getElementById('cb-mid').textContent = Math.round(v.max / 2);
        }

        // ── Rendering ─────────────────────────────────────────────────────────

        function renderStatCards(name, stats) {
            const s = stats;
            const v = VAR_INFO[currentVar];
            const bins = s.histogram[0];
            const edges = s.histogram[1];
            const maxBin = Math.max(...bins);

            const histBars = bins.map((count, i) => {
                const pct = Math.round((count / maxBin) * 100);
                const lo = edges[i].toFixed(0), hi = edges[i+1].toFixed(0);
                return `<div class="hist-bar" style="height:${Math.max(pct,2)}%" title="${lo}–${hi} ${v.unit}: ${count.toLocaleString()} px"></div>`;
            }).join('');

            return `
                <div>
                  <div class="county-name">${name}</div>
                  <div class="county-sub">${v.fullLabel} &bull; ${currentYear}</div>
                  <div class="stat-grid">
                    <div class="stat-card highlight">
                      <div class="stat-value">${s.mean.toFixed(1)} <span class="stat-unit">${v.unit}</span></div>
                      <div class="stat-label">County Mean</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">${s.min.toFixed(1)}</div>
                      <div class="stat-label">Min (${v.unit})</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">${s.max.toFixed(1)}</div>
                      <div class="stat-label">Max (${v.unit})</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">${s.std.toFixed(1)}</div>
                      <div class="stat-label">Std Dev</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">${s.median.toFixed(1)}</div>
                      <div class="stat-label">Median</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">${s.percentile_2.toFixed(1)}</div>
                      <div class="stat-label">P2 (${v.unit})</div>
                    </div>
                    <div class="stat-card">
                      <div class="stat-value">${s.percentile_98.toFixed(1)}</div>
                      <div class="stat-label">P98 (${v.unit})</div>
                    </div>
                  </div>
                </div>
                <div class="histogram-section">
                  <div class="section-title">Distribution (${currentYear})</div>
                  <div class="histogram">${histBars}</div>
                  <div class="hist-axis"><span>${edges[0].toFixed(0)}</span><span>${edges[edges.length-1].toFixed(0)} ${v.unit}</span></div>
                </div>
            `;
        }

        function renderChart(means, stds) {
            const v = VAR_INFO[currentVar];
            const yearIdx = currentYear - 1990;

            // Build selected-year marker dataset
            const marker = new Array(34).fill(null);
            marker[yearIdx] = means[yearIdx];

            const upper = means.map((m, i) => m !== null ? m + stds[i] : null);
            const lower = means.map((m, i) => m !== null ? Math.max(0, m - stds[i]) : null);

            if (tsChart) { tsChart.destroy(); tsChart = null; }

            const canvas = document.getElementById('ts-canvas');
            if (!canvas) return;

            tsChart = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: YEARS,
                    datasets: [
                        {
                            // Upper std bound — invisible line, fills down to lower
                            label: 'upper',
                            data: upper,
                            borderColor: 'transparent',
                            backgroundColor: 'rgba(45,106,79,0.15)',
                            pointRadius: 0,
                            fill: '+1',   // fill toward next dataset (lower)
                            tension: 0.3,
                        },
                        {
                            // Lower std bound
                            label: 'lower',
                            data: lower,
                            borderColor: 'transparent',
                            backgroundColor: 'transparent',
                            pointRadius: 0,
                            fill: false,
                            tension: 0.3,
                        },
                        {
                            // Mean line
                            label: `Mean (${v.unit})`,
                            data: means,
                            borderColor: '#2d6a4f',
                            backgroundColor: '#2d6a4f',
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            fill: false,
                            tension: 0.3,
                            spanGaps: true,
                        },
                        {
                            // Selected year marker
                            label: 'Selected year',
                            data: marker,
                            borderColor: '#b5179e',
                            backgroundColor: '#b5179e',
                            pointRadius: 6,
                            pointHoverRadius: 7,
                            showLine: false,
                        },
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                filter: item => !['upper', 'lower', 'Selected year'].includes(item.text),
                                boxWidth: 12, font: { size: 10 },
                            }
                        },
                        tooltip: {
                            filter: item => item.dataset.label !== 'upper' && item.dataset.label !== 'lower',
                            callbacks: {
                                label: ctx => {
                                    if (ctx.dataset.label === 'Selected year') return `${currentYear}: ${ctx.parsed.y?.toFixed(1)} ${v.unit}`;
                                    return `Mean: ${ctx.parsed.y?.toFixed(1)} ±${stds[ctx.dataIndex]?.toFixed(1)} ${v.unit}`;
                                }
                            }
                        },
                    },
                    scales: {
                        x: {
                            ticks: { font: { size: 9 }, maxTicksLimit: 8 },
                            grid: { display: false },
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { font: { size: 9 }, maxTicksLimit: 5 },
                            grid: { color: '#f0f0f0' },
                            title: { display: true, text: v.unit, font: { size: 9 }, color: '#666' },
                        },
                    },
                    animation: { duration: 300 },
                }
            });
        }

        function updateChartMarker() {
            if (!tsChart) return;
            const yearIdx = currentYear - 1990;
            const means = tsChart.data.datasets[2].data;  // mean dataset
            const marker = new Array(34).fill(null);
            if (means[yearIdx] !== null) marker[yearIdx] = means[yearIdx];
            tsChart.data.datasets[3].data = marker;
            tsChart.update('none');
        }

        // ── Data fetching ──────────────────────────────────────────────────────

        async function fetchOneYear(variable, year, geometry) {
            const url = `${TITILER}/cog/statistics?url=${encodeURIComponent(cogUrl(variable, year))}&max_size=512`;
            const body = JSON.stringify({ type: 'Feature', geometry, properties: {} });
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
            const data = await res.json();
            return data.properties?.statistics?.b1 ?? null;
        }

        async function fetchCurrentStats(feature) {
            const name = feature.properties.name;
            const stats = await fetchOneYear(currentVar, currentYear, feature.geometry);
            if (!stats) throw new Error('No statistics in response');
            return { name, stats };
        }

        async function fetchTimeSeries(feature) {
            if (tsCache[currentVar]) return tsCache[currentVar];  // already cached

            const results = await Promise.all(
                YEARS.map(y => fetchOneYear(currentVar, y, feature.geometry).catch(() => null))
            );
            const means = results.map(s => s?.mean ?? null);
            const stds  = results.map(s => s?.std  ?? null);
            tsCache[currentVar] = { means, stds };
            return tsCache[currentVar];
        }

        async function loadCounty(feature) {
            const name = feature.properties.name;

            // Show loading state with placeholders for both sections
            document.getElementById('stats-area').innerHTML = `
                <div>
                  <div class="county-name">${name}</div>
                  <div class="county-sub loading"><div class="spinner"></div> Loading ${currentYear} statistics…</div>
                </div>
                <div class="chart-section">
                  <div class="section-title">Mean over time (1990–2023)</div>
                  <div class="loading"><div class="spinner"></div> Fetching all years…</div>
                </div>`;

            // Fetch current-year stats and full time series in parallel
            try {
                const [{ stats }, tsData] = await Promise.all([
                    fetchCurrentStats(feature),
                    fetchTimeSeries(feature),
                ]);

                document.getElementById('stats-area').innerHTML =
                    renderStatCards(name, stats) +
                    `<div class="chart-section">
                       <div class="section-title">Mean ± Std Dev over time</div>
                       <div style="height:180px"><canvas id="ts-canvas"></canvas></div>
                     </div>`;

                renderChart(tsData.means, tsData.stds);
            } catch (err) {
                document.getElementById('stats-area').innerHTML =
                    `<div class="prompt"><p style="color:#c00">Error: ${err.message}</p></div>`;
            }
        }

        async function refreshStats(feature) {
            // Called when year or var changes with county already selected
            const name = feature.properties.name;
            const statsArea = document.getElementById('stats-area');

            // Preserve chart section if it exists, just update the top part
            const chartSection = statsArea.querySelector('.chart-section');

            // Fetch stat cards for new year
            const stats = await fetchOneYear(currentVar, currentYear, feature.geometry);
            if (!stats) return;

            const cardHtml = renderStatCards(name, stats);

            if (chartSection && tsCache[currentVar]) {
                // Replace everything above chart, then re-append chart
                statsArea.innerHTML = cardHtml;
                const chartDiv = document.createElement('div');
                chartDiv.className = 'chart-section';
                chartDiv.innerHTML = `<div class="section-title">Mean ± Std Dev over time</div>
                    <div style="height:180px"><canvas id="ts-canvas"></canvas></div>`;
                statsArea.appendChild(chartDiv);
                renderChart(tsCache[currentVar].means, tsCache[currentVar].stds);
            } else if (chartSection && !tsCache[currentVar]) {
                // Variable changed, need new time series
                statsArea.innerHTML = cardHtml +
                    `<div class="chart-section">
                       <div class="section-title">Mean ± Std Dev over time</div>
                       <div class="loading"><div class="spinner"></div> Fetching all years…</div>
                     </div>`;
                const tsData = await fetchTimeSeries(feature);
                const canvas = document.createElement('canvas');
                canvas.id = 'ts-canvas';
                const wrapper = statsArea.querySelector('.chart-section');
                if (wrapper) {
                    wrapper.innerHTML = '<div class="section-title">Mean ± Std Dev over time</div><div style="height:180px"></div>';
                    wrapper.querySelectorAll('div')[1].appendChild(canvas);
                    renderChart(tsData.means, tsData.stds);
                }
            } else {
                statsArea.innerHTML = cardHtml;
            }
        }

        // ── County layer ───────────────────────────────────────────────────────

        const defaultStyle  = { color: '#555', weight: 1, fillOpacity: 0 };
        const hoverStyle    = { color: '#2d6a4f', weight: 2, fillOpacity: 0.15 };
        const selectedStyle = { color: '#b5179e', weight: 3, fillOpacity: 0.1 };

        fetch(COUNTIES_URL)
            .then(r => r.json())
            .then(geojson => {
                countiesGeoJSON = L.geoJSON(geojson, {
                    style: defaultStyle,
                    onEachFeature(feature, layer) {
                        layer.on({
                            mouseover() { if (layer !== selectedLayer) layer.setStyle(hoverStyle); },
                            mouseout()  { if (layer !== selectedLayer) layer.setStyle(defaultStyle); },
                            click(e) {
                                L.DomEvent.stopPropagation(e);
                                if (selectedLayer && selectedLayer !== layer) selectedLayer.setStyle(defaultStyle);
                                selectedLayer = layer;
                                selectedFeature = feature;
                                layer.setStyle(selectedStyle);
                                tsCache = {};  // clear cache for new county
                                if (tsChart) { tsChart.destroy(); tsChart = null; }
                                loadCounty(feature);
                            }
                        });
                        layer.bindTooltip(feature.properties.name, { sticky: true });
                    }
                }).addTo(map);
            });

        // ── Controls ───────────────────────────────────────────────────────────

        document.querySelectorAll('.var-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.var-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentVar = btn.dataset.var;
                updateColorbar();
                updateTileLayer();
                if (selectedFeature) refreshStats(selectedFeature);
            });
        });

        document.getElementById('year-slider').addEventListener('input', e => {
            currentYear = parseInt(e.target.value);
            document.getElementById('year-display').textContent = currentYear;
            updateTileLayer();
            if (selectedFeature) {
                // Just update the chart marker immediately, then refresh stat cards
                updateChartMarker();
                refreshStats(selectedFeature);
            }
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && currentYear > 1990) {
                currentYear--;
                document.getElementById('year-slider').value = currentYear;
                document.getElementById('year-display').textContent = currentYear;
                updateTileLayer();
                if (selectedFeature) { updateChartMarker(); refreshStats(selectedFeature); }
            }
            if (e.key === 'ArrowRight' && currentYear < 2023) {
                currentYear++;
                document.getElementById('year-slider').value = currentYear;
                document.getElementById('year-display').textContent = currentYear;
                updateTileLayer();
                if (selectedFeature) { updateChartMarker(); refreshStats(selectedFeature); }
            }
        });

        updateColorbar();
        updateTileLayer();
    </script>
</body>
</html>
